<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Edukasi Atmosfer</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            position: relative;
            width: 500px; /* Sesuaikan dengan lebar gambar */
            margin: 20px auto;
        }

        #bg-image {
            width: 100%;
            display: block;
            border-radius: 15px;
            opacity: 0.8;
        }

        /* Container untuk label yang bisa ditarik */
        .label-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .draggable {
            padding: 10px 15px;
            background: #e94560;
            color: white;
            border-radius: 5px;
            cursor: grab;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Titik-titik Drop (Drop Zones) yang diletakkan di atas gambar */
        .drop-zone {
            position: absolute;
            width: 140px;
            height: 40px;
            border: 2px dashed #fff;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateX(-50%);
            left: 25%; /* Mengatur posisi horizontal label */
        }

        /* Mengatur posisi vertikal tiap zona sesuai gambar */
        #zone-exosphere { top: 3%; }
        #zone-thermosphere { top: 22%; }
        #zone-mesosphere { top: 40%; }
        #zone-stratosphere { top: 55%; }
        #zone-troposphere { top: 68%; }

        .correct {
            background: #4caf50 !important;
            border: 2px solid #fff !important;
            font-weight: bold;
        }

        #message {
            height: 30px;
            margin: 15px 0;
            font-size: 1.2em;
            color: #4caf50;
        }

        button {
            padding: 10px 20px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Tebak Lapisan Atmosfer 🌍</h1>
    <p>Tarik nama lapisan ke kotak yang tepat di gambar!</p>

    <div class="label-container" id="source-container">
        <div class="draggable" draggable="true" id="Exosphere">Exosphere</div>
        <div class="draggable" draggable="true" id="Thermosphere">Thermosphere</div>
        <div class="draggable" draggable="true" id="Mesosphere">Mesosphere</div>
        <div class="draggable" draggable="true" id="Stratosphere">Stratosphere</div>
        <div class="draggable" draggable="true" id="Troposphere">Troposphere</div>
    </div>

    <div class="game-wrapper">
        <img src="lapisan-lapisan-atmosfer.jpg" id="bg-image" alt="Atmosfer">

        <div class="drop-zone" id="zone-exosphere" data-answer="Exosphere">?</div>
        <div class="drop-zone" id="zone-thermosphere" data-answer="Thermosphere">?</div>
        <div class="drop-zone" id="zone-mesosphere" data-answer="Mesosphere">?</div>
        <div class="drop-zone" id="zone-stratosphere" data-answer="Stratosphere">?</div>
        <div class="drop-zone" id="zone-troposphere" data-answer="Troposphere">?</div>
    </div>

    <div id="message"></div>
    <button onclick="location.reload()">Main Lagi</button>

    <script>
        const draggables = document.querySelectorAll('.draggable');
        const dropZones = document.querySelectorAll('.drop-zone');
        let solved = 0;

        draggables.forEach(draggable => {
            draggable.addEventListener('dragstart', () => {
                draggable.classList.add('dragging');
            });

            draggable.addEventListener('dragend', () => {
                draggable.classList.remove('dragging');
            });
        });

        dropZones.forEach(zone => {
            zone.addEventListener('dragover', e => {
                e.preventDefault();
            });

            zone.addEventListener('drop', e => {
                const draggable = document.querySelector('.dragging');
                const answer = zone.getAttribute('data-answer');

                if (draggable.id === answer) {
                    zone.innerText = answer;
                    zone.classList.add('correct');
                    draggable.style.display = 'none';
                    solved++;
                    
                    if(solved === 5) {
                        document.getElementById('message').innerText = "Selamat! Kamu Pintar! ✨";
                    }
                } else {
                    alert("Salah tempat! Perhatikan ikon gambarnya.");
                }
            });
        });
    </script>
</body>
</html>
