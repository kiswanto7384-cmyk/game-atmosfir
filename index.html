<style>
    /* Tambahkan atau perbarui gaya CSS berikut di dalam tag <style> */
    .game-container {
        display: flex;
        gap: 50px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 1000px;
        /* Hapus properti background: linear-gradient yang lama */
    }

    /* Latar Belakang Atmosfer Baru (Hapus Latar Belakang Lama) */
    .column-with-bg {
        width: 300px;
        min-height: 400px;
        border-radius: 10px;
        padding: 10px;
        display: flex;
        flex-direction: column-reverse; /* Menyusun dari bawah ke atas */
        box-shadow: 0 0 15px rgba(0,0,0,0.3);
        
        /* Gradasi warna atmosfer yang bersih dan cerah (Dari Bumi ke Angkasa) */
        background: linear-gradient(to top,
            #dcf8f9 0%,   /* Troposphere (Dekat Bumi) */
            #a6e9f1 15%,  /* Stratosphere */
            #70c5eb 40%,  /* Mesosphere */
            #3ea1dc 65%,  /* Thermosphere */
            #0a2f4a 100% /* Exosphere (Luar Angkasa) */
        );
    }

    /* Styling Elemen di Dalam Kolom Latar Belakang */
    .atmosphere-layer-area {
        height: 60px; /* Tinggi untuk setiap area drop */
        border-bottom: 1px dashed rgba(255,255,255,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    /* Teks Ketinggian */
    .altitude-text {
        position: absolute;
        bottom: 2px;
        right: 5px;
        color: rgba(255,255,255,0.7);
        font-size: 0.7em;
        font-weight: bold;
    }

    /* Ikon/Gambar Objek Sesuai Gambar Asli */
    .layer-icon {
        position: absolute;
        left: 10px;
        opacity: 0.8;
    }
</style>

<div class="game-container">
    <div class="column column-with-bg">
        <div class="drop-zone atmosphere-layer-area" data-target="troposphere">
            <span class="altitude-text">20 km</span>
            <img src="path/to/icon-plane.png" class="layer-icon" style="width: 25px;"> <span class="label-placeholder">Taruh Troposphere</span>
        </div>
        <div class="drop-zone atmosphere-layer-area" data-target="stratosphere">
            <span class="altitude-text">50 km</span>
            <img src="path/to/icon-balloon.png" class="layer-icon" style="width: 20px;"> <span class="label-placeholder">Taruh Stratosphere</span>
        </div>
        <div class="drop-zone atmosphere-layer-area" data-target="mesosphere">
            <span class="altitude-text">85 km</span>
            <img src="path/to/icon-meteor.png" class="layer-icon" style="width: 25px;"> <span class="label-placeholder">Taruh Mesosphere</span>
        </div>
        <div class="drop-zone atmosphere-layer-area" data-target="thermosphere">
            <span class="altitude-text">690 km</span>
            <img src="path/to/icon-aurora.png" class="layer-icon" style="width: 40px;"> <span class="label-placeholder">Taruh Thermosphere</span>
        </div>
        <div class="drop-zone atmosphere-layer-area" data-target="exosphere">
            <img src="path/to/icon-satellite.png" class="layer-icon" style="width: 30px;"> <span class="label-placeholder">Taruh Exosphere</span>
        </div>
    </div>

    <div class="column" id="layers">
        <div class="layer-box" draggable="true" id="exosphere">Exosphere</div>
        <div class="layer-box" draggable="true" id="thermosphere">Thermosphere</div>
        <div class="layer-box" draggable="true" id="mesosphere">Mesosphere</div>
        <div class="layer-box" draggable="true" id="stratosphere">Stratosphere</div>
        <div class="layer-box" draggable="true" id="troposphere">Troposphere</div>
    </div>
</div>
